name: Deploy demo to GitHub Pages

# Pages hosts ONLY the curated demo (served at /demo/); the bare repo URL
# redirects there. The full site lives elsewhere (Netlify).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci

      - name: Build demo (curated subset)
        run: npm run build:demo

      - name: Assemble Pages — demo only, with a root redirect
        run: |
          mkdir -p site/demo
          cp -r dist-demo/. site/demo/
          printf '%s\n' \
            '<!doctype html>' \
            '<meta charset="utf-8">' \
            '<title>Immersive Terminal for RPGs — demo</title>' \
            '<meta http-equiv="refresh" content="0; url=./demo/">' \
            '<link rel="canonical" href="./demo/">' \
            '<body style="background:#000;color:#7CFC00;font-family:monospace">' \
            '<a style="color:#7CFC00" href="./demo/">→ open the demo</a>' \
            > site/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
